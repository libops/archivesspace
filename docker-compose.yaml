---
x-common: &common
  restart: unless-stopped
  networks:
    default:

networks:
  default:

volumes:
  archivesspace-data: {}
  mariadb-data: {}
  solr-data: {}

secrets:
  DB_ROOT_PASSWORD:
    file: ./secrets/DB_ROOT_PASSWORD
  ARCHIVESSPACE_DB_PASSWORD:
    file: ./secrets/ARCHIVESSPACE_DB_PASSWORD

services:
  traefik:
    <<: *common
    image: traefik:v3.7.5@sha256:e4d98158c01ad752fc1071d4e9573788747230d902cdde00a772516e692d07c9
    command:
      - --ping=true
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=300s
    ports:
      - "80:80"
    volumes:
      - ./conf/traefik:/etc/traefik/dynamic:ro,z
    depends_on:
      archivesspace:
        condition: service_healthy
    healthcheck:
      test: traefik healthcheck --ping
      start_period: 10s

  archivesspace:
    <<: *common
    build:
      context: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPACE_DB_MIGRATE: "${ASPACE_DB_MIGRATE:-true}"
      ASPACE_JAVA_XMX: "${ASPACE_JAVA_XMX:--Xmx2048m}"
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: "${DB_NAME:-archivesspace}"
      DB_USER: "${DB_USER:-archivesspace}"
      INGRESS_HOSTNAMES: "localhost"
      INGRESS_SCHEME: "http"
      JAVA_OPTS: "${JAVA_OPTS:--Djava.awt.headless=true -Dfile.encoding=UTF-8 -server -Xss1024k -Djavax.accessibility.assistive_technologies=''}"
      SMTP_FROM: "${SMTP_FROM:-noreply@localhost}"
      SMTP_HOST: "${SMTP_HOST:-host.docker.internal}"
      SMTP_PORT: "${SMTP_PORT:-25}"
    secrets:
      - source: ARCHIVESSPACE_DB_PASSWORD
        target: DB_PASSWORD
    volumes:
      - archivesspace-data:/archivesspace/data:rw
    depends_on:
      database-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      solr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/ || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 5
      start_period: 5m

  database-init:
    image: libops/base:3.2.2.0@sha256:0c6bab5444d4758bb977a42c1e5199cba733c7776e1aa006f8021108a785c547
    restart: "no"
    networks:
      default:
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: "${DB_NAME:-archivesspace}"
      DB_USER: "${DB_USER:-archivesspace}"
      DB_CHARACTER_SET: utf8mb4
      DB_COLLATION: utf8mb4_unicode_ci
    secrets:
      - source: DB_ROOT_PASSWORD
      - source: ARCHIVESSPACE_DB_PASSWORD
        target: DB_PASSWORD
    volumes:
      - ./scripts/init-database.sh:/usr/local/bin/init-database.sh:ro,z
    entrypoint: /usr/local/bin/init-database.sh
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    <<: *common
    image: libops/mariadb:11@sha256:1b0f53f277cedf95e1fa6df25580de01dd2d0722b09f39fe0d93cfb6263e26f3
    secrets:
      - source: DB_ROOT_PASSWORD
    volumes:
      - mariadb-data:/var/lib/mysql:rw

  solr:
    <<: *common
    image: libops/archivesspace-solr:4.2.0@sha256:4ed8c17b8b2c34e3c91293697a439ce5e22734a37a29c2fc2e92165ad0c5ed45
    environment:
      SOLR_JAVA_MEM: "-Xms1g -Xmx1g"
    volumes:
      - solr-data:/var/solr:rw
