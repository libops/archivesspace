---
services:
  archivesspace:
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    # Add these mounts for local editing when you want container restarts to see
    # file changes before rebuilding the template image.
    # volumes:
    #   - ./plugins:/archivesspace/plugins:rw
    #   - ./locales:/archivesspace/locales:rw
    #   - ./stylesheets:/archivesspace/stylesheets:rw
  mariadb:
    ports:
      - 3306:3306
  solr:
    ports:
      - 8983:8983
  mailpit:
    image: axllent/mailpit:v1.26
    ports:
      - 1025:1025
      - 8025:8025
